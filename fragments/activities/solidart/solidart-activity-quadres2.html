<div id="solidart-activity-quadres2" class="sub-activity hidden">
    <button class="btn btn--secondary btn--sm mb-4" onclick="showSolidartMenu()">← Tornar al menú</button>

    <div id="solidart-quadres2-setup" class="game-panel__header text-center">
        <div id="solidart-feedback-config2"
            class="mb-6 p-4 bg-gray-50 border rounded-lg mx-auto hidden image-display--max-400">
            <label for="solidart-feedback-level2" class="block mb-2 font-semibold">
                Nivell de feedback per a l'alumne:
            </label>
            <select id="solidart-feedback-level2" class="form-select form-select--compact w-full">
                <option value="none">Cap (no es marquen les imatges)</option>
                <option value="simple" selected>Simple (només la triada)</option>
                <option value="full">Complet (marca correcta i error)</option>
            </select>
        </div>

        <p class="mb-2 text-strong-lg">Selecciona el nivell:</p>
        <div class="solidart-difficulty-row mt-6">
            <button class="btn btn--primary btn--difficulty-easy btn--w-250"
                onclick="initSolidartQuadres2('Fàcil')">Fàcil</button>
            <button class="btn btn--primary btn--difficulty-medium btn--w-250"
                onclick="initSolidartQuadres2('Mitjà')">Mitjà</button>
            <button class="btn btn--primary btn--difficulty-hard btn--w-250"
                onclick="initSolidartQuadres2('Difícil')">Difícil</button>
            <button class="btn btn--primary btn--difficulty-mixed btn--w-250"
                onclick="initSolidartQuadres2('Mix')">Barrejat</button>
        </div>
    </div>

    <div id="solidart-quadres2-quiz-container" class="hidden">
        <div class="game-panel__stats flex justify-between mb-4">
            <span id="solidart-quadres2-progress"></span>
            <span id="solidart-quadres2-score-display"></span>
        </div>
        <div class="game-panel__question text-center">
            <h4 id="solidart-quadres2-text" class="text-2xl font-bold mb-8 p-6 bg-white rounded-xl shadow-sm border">
                Pregunta...
            </h4>
            <div id="solidart-quadres2-options" class="grid grid-cols-2 gap-4"></div>
        </div>
        <div id="solidart-quadres2-feedback-area"
            class="feedback-panel hidden text-center mt-6 p-4 rounded bg-gray-50 border">
            <p id="solidart-quadres2-feedback-msg" class="feedback-panel__title text-xl font-bold mb-2"></p>
            <button class="btn btn--primary hidden" onclick="nextSolidartQuadres2()">Següent</button>
        </div>
    </div>

    <div id="solidart-quadres2-results" class="result-screen hidden text-center p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-3xl font-bold mb-4">Resultat Final</h2>
        <div class="flex justify-center gap-10 mb-6">
            <div>
                <p class="text-gray-500">Puntuació</p>
                <p id="solidart-quadres2-final-score"
                    class="result-screen__score text-4xl font-bold text-primary"></p>
            </div>
            <div>
                <p class="text-gray-500">Percentatge</p>
                <p id="solidart-quadres2-final-percentage"
                    class="result-screen__percentage text-4xl font-bold text-primary"></p>
            </div>
        </div>
        <p id="solidart-quadres2-final-msg" class="result-screen__message text-xl mb-6"></p>
        <button class="btn btn--primary btn--w-200 btn--centered" onclick="showSolidartMenu()">Tornar al menú</button>
    </div>
</div>
