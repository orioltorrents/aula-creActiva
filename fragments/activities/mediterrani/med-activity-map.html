<div id="med-activity-map" class="sub-activity hidden">
    <button class="btn btn--secondary btn--sm mb-2" onclick="showMediterraniMenu()">← Tornar al menú</button>

    <div class="game-panel__header">
        <h3 data-i18n="act_map_title">Mapa del Mediterrani</h3>
        <div class="game-panel__controls">
            <button id="btn-toggle-country-map" onclick="toggleCountryNameMap()" class="btn btn--secondary"
                data-i18n="hide_country">Amagar País</button>
            <button id="btn-med-map-practice" onclick="initMediterraniMapGame('practice')" class="btn btn--secondary"
                data-i18n="btn_practice">Pràctica</button>
            <button id="btn-med-map-exam" onclick="initMediterraniMapGame('exam')" class="btn btn--secondary"
                data-i18n="btn_exam">Examen</button>
        </div>
    </div>

    <div id="med-map-area" class="hidden">
        <div class="game-panel__stats">
            <span id="med-map-score">Punts: 0</span>
            <span id="med-map-time" class="hidden">Temps: 60s</span>
        </div>
        <div class="game-panel__question">
            <h4 id="med-map-question">Clicka...</h4>
        </div>
        <div id="map-container" class="map-wrapper"></div>
        <p id="med-map-feedback" class="game-panel__feedback"></p>
    </div>
</div>
