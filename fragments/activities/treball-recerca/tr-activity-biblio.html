<div id="tr-activity-biblio" class="sub-activity hidden">
    <button class="btn btn--secondary btn--sm mb-2" onclick="showTrMenu()">← Tornar al menú</button>

    <div class="game-panel__header">
        <h3 data-i18n="act_biblio_title">Bibliografia i Cites</h3>
    </div>

    <div class="activity-instructions">
        <p data-i18n="instruction_biblio">
            Pots o bé triar el nivell de les preguntes o bé triar un tipus de preguntes a treballar:
        </p>
    </div>

    <div class="game-panel__controls py-4" id="tr-biblio-level-selection">
        <div id="tr-biblio-topic-selection" class="flex flex-col items-center"></div>
        <div class="flex flex-col items-center mt-4">
            <p class="font-bold mb-3 text-center" data-i18n="select_level">O tria per nivell (tots els temes):</p>
            <div class="level-button-row">
                <button onclick="startTrBiblioWithFilter('all', 'facil')"
                    class="btn btn--primary quiz-filter-button quiz-filter-button--easy" data-i18n="level_easy">
                    Fàcil
                </button>
                <button onclick="startTrBiblioWithFilter('all', 'dificil')"
                    class="btn btn--primary quiz-filter-button quiz-filter-button--hard" data-i18n="level_hard">
                    Difícil
                </button>
                <button onclick="startTrBiblioWithFilter('all', 'mixed')"
                    class="btn btn--primary quiz-filter-button quiz-filter-button--mixed" data-i18n="level_mixed">
                    Barrejat
                </button>
            </div>
        </div>
    </div>

    <div id="tr-biblio-quiz-container" class="hidden">
        <div class="game-panel__stats">
            <span id="tr-biblio-progress">Pregunta 1/8</span>
            <span id="tr-biblio-score">Punts: 0</span>
        </div>
        <div class="game-panel__question">
            <h4 id="tr-biblio-question-text">Pregunta...</h4>
            <div id="tr-biblio-options" class="options-list"></div>
        </div>
        <p id="tr-biblio-feedback" class="game-panel__feedback"></p>
    </div>

    <div id="tr-biblio-results" class="result-screen hidden text-center">
        <h3 data-i18n="final_score">Resultats</h3>
        <p id="tr-biblio-final-score" class="result-screen__score text-2xl font-bold">0 / 80</p>
        <p id="tr-biblio-message"></p>
        <button onclick="showTrMenu()" class="btn btn--secondary">Tornar</button>
    </div>
</div>
