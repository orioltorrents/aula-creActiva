<div id="tr-activity-preguntes" class="sub-activity hidden">
    <div id="tr-preguntes-setup-wrapper" class="flex flex-col items-center mt-12 mb-16">
        <button class="btn btn--secondary btn--sm mb-8" onclick="showTrMenu()">← Tornar al menú</button>

        <div id="tr-preguntes-setup"
            class="container-white p-10 rounded-xl shadow-lg border w-full max-w-5xl text-center">
            <h3 class="text-3xl font-bold mb-8 text-blue-600 flex items-center justify-center gap-3">
                <i class="fas fa-question-circle"></i>
                <span data-i18n="tr_project_title">Treball de recerca</span> — <span>Temes i preguntes</span>
            </h3>
            <p class="mb-4 text-xl text-gray-700 font-semibold italic">
                "Has escollit aquest tema pel teu treball de recerca, marca les possibles preguntes investigables que et
                podries plantejar-te"
            </p>
            <p class="mb-10 text-lg text-gray-500">Escull una categoria per començar a practicar.</p>
            <div id="tr-preguntes-categories-container"></div>
        </div>
    </div>

    <div id="tr-preguntes-quiz-container" class="hidden">
        <div class="game-panel__stats flex justify-between">
            <span id="tr-preguntes-progress">Pregunta 1 / 15</span>
        </div>
        <div class="game-panel__question mt-6 mb-6 p-6 bg-white rounded shadow-sm text-center">
            <h4 id="tr-preguntes-text" class="text-2xl font-semibold mb-8">Pregunta...</h4>

            <div class="flex justify-center gap-4 flex-wrap">
                <button id="btn-investigable" class="btn btn--primary btn--success"
                    onclick="checkTrPreguntaRespuesta('Investigable')">Investigable</button>
                <button id="btn-no-investigable" class="btn btn--primary btn--danger"
                    onclick="checkTrPreguntaRespuesta('No investigable')">No investigable</button>
            </div>
        </div>
        <div id="tr-preguntes-feedback-area"
            class="feedback-panel hidden text-center mt-4 p-4 rounded bg-gray-50 border">
            <p id="tr-preguntes-feedback-msg" class="feedback-panel__title text-xl font-bold mb-2"></p>
            <p id="tr-preguntes-feedback-desc" class="feedback-panel__body mb-4"></p>
            <button id="tr-preguntes-next-btn" class="btn btn--primary" onclick="nextTrPregunta()">Següent pregunta</button>
        </div>
    </div>

    <div id="tr-preguntes-results" class="result-screen hidden text-center p-8 bg-white rounded shadow">
        <h3 data-i18n="final_score">Resultat final</h3>
        <p id="tr-preguntes-final-score" class="result-screen__score text-4xl font-bold text-blue-600 mt-4">0 / 15</p>
        <p id="tr-preguntes-final-percentage"
            class="result-screen__percentage text-2xl font-semibold mb-4 text-gray-700">0%</p>
        <p id="tr-preguntes-final-msg" class="result-screen__message text-lg mb-8"></p>
        <button onclick="showTrMenu()" class="btn btn--secondary">Tornar</button>
    </div>
</div>
