<div id="tr-activity-temes" class="sub-activity hidden">
    <button class="btn btn--secondary btn--sm mb-2" onclick="showTrMenu()">← Tornar al menú</button>

    <div id="tr-temes-setup" class="game-panel__header text-center">
        <h3>
            <span data-i18n="tr_project_title">Treball de recerca</span> —
            <span data-i18n="act_tr_temes_title">Temes i Preguntes</span>
        </h3>
        <p class="mb-4" data-i18n="act_tr_temes_desc">Tria grups de preguntes d'un tema de recerca.</p>
        <div id="tr-temes-categories-container" class="flex justify-center gap-4 flex-wrap mt-4"></div>
    </div>

    <div id="tr-temes-quiz-container" class="hidden">
        <div class="game-panel__stats flex justify-between mb-4">
            <span id="tr-temes-progress">Tema 1 / X</span>
            <span id="tr-temes-score">Punts: 0</span>
        </div>

        <div class="bg-white rounded shadow-sm p-6 text-center">
            <h3 id="tr-temes-tema" class="text-3xl font-bold mb-2 text-blue-800">TEMA</h3>
            <p class="mb-6 text-gray-600">
                Selecciona <strong class="text-black">totes</strong> les preguntes que consideris
                <strong class="text-blue-600">INVESTIGABLES</strong>.
            </p>

            <div id="tr-temes-options" class="flex flex-col gap-3 text-left"></div>

            <div class="mt-8">
                <button id="tr-temes-check-btn" class="btn btn--primary w-full text-xl py-3"
                    onclick="checkTrTemesRespostes()">Comprovar Selecció</button>
            </div>
        </div>
        <div id="tr-temes-feedback-area" class="feedback-panel hidden mt-6">
            <div id="tr-temes-feedback-list" class="feedback-panel__list flex flex-col gap-3 mb-6"></div>
            <button id="tr-temes-next-btn" class="btn btn--primary w-full text-lg py-3" onclick="nextTrTema()">
                Següent Tema
            </button>
        </div>
    </div>

    <div id="tr-temes-results" class="result-screen hidden text-center p-8 bg-white rounded shadow">
        <h3 data-i18n="final_score">Resultat final</h3>
        <p id="tr-temes-final-score" class="result-screen__score text-4xl font-bold text-blue-600 mt-4">0 / 15</p>
        <p id="tr-temes-final-percentage" class="result-screen__percentage text-2xl font-semibold mb-4 text-gray-700">
            0%
        </p>
        <p id="tr-temes-final-msg" class="result-screen__message text-lg mb-8"></p>
        <button onclick="showTrMenu()" class="btn btn--secondary">Tornar</button>
    </div>
</div>
