                    <!-- ACTIVITAT: Edició d'Àudio (Cakewalk Sonar) -->

                        <button class="btn btn--secondary btn--sm mb-2" onclick="showDigitalitzacioMenu()">← Tornar al
                            menú</button>
                        <div class="game-panel__header">
                            <h3 data-i18n="act_audio_title">Edició d'àudio</h3>
                        </div>

                                <div class="flex gap-2">
                                    <button id="sonar-help-btn" class="btn btn--info btn--sm" onclick="showSonarHelp()"

                            <div id="sonar-question" class="text-lg font-bold p-2 bg-blue-50 rounded">Clica...</div>

                                    class="interactive-image">
                            </div>
                            <p id="sonar-feedback" class="game-panel__feedback mt-2"></p>

                                    <button onclick="closeCalibration()" class="text-red-400">⛶</button>
                                </div>
                                <div class="grid grid-cols-3 gap-1 mb-2 text-center">
                                    <div></div><button onclick="nudgeTarget('y', -1)"
                                        class="bg-gray-700 p-1 rounded">⛶</button>
                                    <div></div>
                                    <button onclick="nudgeTarget('x', -1)" class="bg-gray-700 p-1 rounded">⛶</button>
                                    <button onclick="nudgeTarget('y', 1)" class="bg-gray-700 p-1 rounded">⛶</button>
                                    <button onclick="nudgeTarget('x', 1)" class="bg-gray-700 p-1 rounded">⛶</button>
                                </div>
                                <div class="flex gap-2 justify-center mb-2">
                                    <button onclick="nudgeTarget('w', 1); nudgeTarget('h', 1)"

                                    <button onclick="nudgeTarget('w', -1); nudgeTarget('h', -1)"
                                        class="bg-gray-700 px-2 rounded">-</button>

                                </div>
                                <div id="calibration-values" class="text-center text-xs opacity-75">x:0 y:0 w:0 h:0

                                <div class="mt-2 text-center">

                                </div>
                                <p class="mt-2 text-yellow-400 text-center italic">Està ben posat ara?</p>
                            </div>
                        </div>
