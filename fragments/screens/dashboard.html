<section id="dashboard-screen" class="screen hidden">
    <header class="top-bar">
        <div class="logo">Aula CreActiva</div>
        <div class="user-info">
            <select id="language-selector" class="lang-select">
                <option value="ca">Català</option>
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
            <span id="user-name" data-i18n="loading">Carregant...</span>
            <span id="user-course" class="badge">...</span>
            <button id="logout-btn" class="btn-secondary" data-i18n="logout">Sortir</button>
        </div>
    </header>

    <main class="dashboard-content">
        <div class="welcome-banner">
            <h2 id="welcome-msg" data-i18n="hi">Hola!</h2>
            <p data-i18n="active_projects">Aquests són els teus projectes actius.</p>
        </div>

        <div id="projects-grid" class="projects-grid">
            <div class="loader" data-i18n="loading_projects">Carregant projectes...</div>
        </div>
    </main>
</section>
