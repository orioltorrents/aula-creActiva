<section id="login-screen" class="screen active">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 data-i18n="login_title">Aula CreActiva</h1>
                <p data-i18n="login_subtitle">Accés a l'Entorn d'Aprenentatge</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email" data-i18n="label_email">Correu electrònic</label>
                    <input type="email" id="email" placeholder="alumne@escola.cat" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="label_password">Contrasenya</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-text" data-i18n="btn_login">Entrar</span>
                    <div class="loader hidden" id="login-loader"></div>
                </button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>
    </div>
</section>
